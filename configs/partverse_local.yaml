# PartVerse + 全本地后端（SGLang Qwen3.5-VL + 本地图像编辑 HTTP）
#
# 前置（两个终端）:
#   1) CUDA_VISIBLE_DEVICES=1 VLM_PORT=8002 bash scripts/tools/launch_local_vlm.sh
#   2) CUDA_VISIBLE_DEVICES=2 /path/to/pipeline_server/bin/python scripts/tools/image_edit_server.py
#      （默认 FLUX.2-klein-9B:8001；无 Qwen-Image-Edit 权重时用默认即可）
#
# 管线:
#   PARTCRAFT_DATA_ROOT=... python scripts/run_streaming.py \
#       --config configs/partverse_local.yaml
#   （attention 后端见 pipeline.attn_backend；勿强制 ATTN_BACKEND=xformers，见下方说明）

ckpt_root: "/mnt/zsn/ckpts"

data:
  data_dir: "/mnt/zsn/data/partverse"
  derive_dataset_subpaths: true
  shards: ["05"]
  output_by_shard: true
  output_dir: "/mnt/zsn/data/partverse/outputs/partverse"

phase0:
  vlm_backend: "local"
  vlm_model: "Qwen3.5-27B"
  vlm_base_url: "http://localhost:8002/v1"
  vlm_api_key: "dummy"
  local_model_path: "Qwen3.5-27B"
  local_base_url: "http://localhost:8002/v1"
  local_gpu_ids: "0"
  local_max_model_len: 32768
  local_tensor_parallel: 1
  views_for_labeling: [32, 33, 34, 35]
  max_workers: 2
  batch_size: 50
  cache_dir: "cache/phase0"

phase1:
  min_parts_per_object: 2
  max_parts_per_object: 50
  core_categories: ["body", "torso", "base", "frame", "main", "head", "wall", "floor"]
  max_swap_candidates: 5
  min_cluster_size: 50
  max_scale_edits_per_part: 1
  max_material_edits_per_part: 1
  max_identity_edits_per_object: 1
  max_global_edits_per_object: 3
  cache_dir: "cache/phase1"

phase2:
  alignment_strategy: "contact"
  max_scale_ratio: 3.0
  max_penetration: 0.3
  max_gap_distance: 0.15
  require_same_object_type: true
  max_part_size_ratio: 5.0
  cache_dir: "cache/phase2"

pipeline:
  # 新版 xformers 已去掉 fmha.BlockDiagonalMask，TRELLIS 稀疏注意力会报错；用 flash_attn（需已安装 flash-attn）。
  attn_backend: "flash_attn"
  lookahead_objects: 0  # run_streaming prefetch depth; try 2–3 on multi-GPU

phase2_5:
  enabled: true
  trellis_text_ckpt: "checkpoints/TRELLIS-text-xlarge"
  trellis_image_ckpt: "checkpoints/TRELLIS-image-large"
  num_combinations: 2
  seed: 42
  cache_dir: "cache/phase2_5"
  max_refine: 1000
  output_format: "glb"
  image_edit_backend: "local_diffusers"
  image_edit_base_url: "http://localhost:8001"
  image_edit_enabled: true
  image_edit_workers: 2
  num_edit_views: 8

phase3:
  cache_dir: "cache/phase3"
  # VLM judge: allow long CoT before JSON (local Qwen); raise if server OOMs
  vlm_max_tokens: 4096
  # OpenAI json_object mode — enable if your SGLang build supports it
  vlm_json_response_format: false
  # Cheap trimesh checks on before.ply/after.ply before TRELLIS decode + VLM judge
  vlm_mesh_prefilter: true
  vlm_mesh_prefilter_min_vertices: 8
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  min_area_ratio: 0.1
  max_area_ratio: 8.0
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  edit_ratio_precision: 4
  min_part_proportion: 0.005
  max_part_proportion: 0.80
  max_components: 5
  min_vertices: 50
  min_extent: 0.0001
  max_center_drift: 0.3
  min_bbox_iou: 0.1
  check_vertex_color: false
  max_penetration: 0.3
  max_gap_ratio: 0.15
  max_scale_ratio: 3.0
  instructions_per_edit: 3
  num_views: 12
  resolution: 518
  blender_path: "blender"

logging:
  level: "INFO"
  log_dir: "logs"
