# Pipeline v2 — full shard01 run (object-centric layout).
#
# Inputs (per object_id):
#   data/partverse/mesh/01/<obj_id>.npz     (TRELLIS GT mesh + parts)
#   data/partverse/images/01/<obj_id>.npz   (multi-view photos + frames)
#
# Output root (every step writes UNDER this directory only):
#   outputs/partverse/pipeline_v2_shard01/
#       _global/manifest.jsonl
#       objects/01/<obj_id>/
#           meta.json   status.json
#           phase1/{overview.png, parsed.json, raw.txt}
#           highlights/e{idx:02d}.png
#           edits_2d/{edit_id}_{input,edited}.png
#           edits_3d/<edit_id>/{before,after}.{npz,ply,png}

ckpt_root: /Node11_nvme/wjw/3D_Editing/PartCraft3D/checkpoints

blender: /Node11_nvme/artgen/lac/.tools/blender-4.2.0-linux-x64/blender

data:
  output_dir:  /Node11_nvme/wjw/3D_Editing/PartCraft3D/outputs/partverse/pipeline_v2_shard01
  mesh_root:   /Node11_nvme/wjw/3D_Editing/PartCraft3D/data/partverse/mesh
  images_root: /Node11_nvme/wjw/3D_Editing/PartCraft3D/data/partverse/images

pipeline:
  # The single source of truth for which GPUs participate in this run.
  # Any number works (1, 2, 4, 8, ...). VLM and FLUX server ports are
  # derived from base+stride so we can spawn N servers without listing
  # them anywhere else.
  gpus: [4, 5, 6, 7]
  prerender_workers: 8

  vlm_port_base:    8002
  vlm_port_stride:  10
  flux_port_base:   8004
  flux_port_stride: 1

  # Phase ordering. Each phase optionally needs a server pool, runs a
  # set of pipeline_v2 steps, and may dispatch the GPU steps across
  # the gpus list (use_gpus: true) instead of single-process.
  # `optional: true` phases are skipped unless --with-optional is set
  # or PHASES env explicitly names them.
  phases:
    - { name: A,  desc: "phase1 VLM",        servers: vlm,  steps: [s1] }
    - { name: B,  desc: "highlights",        servers: none, steps: [s2], optional: true }
    - { name: C,  desc: "FLUX 2D",           servers: flux, steps: [s4] }
    - { name: D,  desc: "TRELLIS 3D edit",   servers: none, steps: [s5],  use_gpus: true }
    - { name: D2, desc: "deletion mesh",     servers: none, steps: [s5b] }
    - { name: E,  desc: "3D rerender",       servers: none, steps: [s6, s6b], use_gpus: true }
    - { name: F,  desc: "addition backfill", servers: none, steps: [s7] }

phase0:
  vlm_model: Qwen3.5-27B
  # vlm_base_urls is auto-derived from pipeline.gpus + vlm_port_base
  # at runtime; you can override it here if you want to point at
  # remote servers instead.

phase2_5:
  enabled: true
  trellis_text_ckpt: checkpoints/TRELLIS-text-xlarge
  image_edit_backend: local_diffusers
  image_edit_base_urls:
    - http://localhost:8004
    - http://localhost:8005
    - http://localhost:8006
    - http://localhost:8007
  workers_per_server: 2
  export_ply: false
  export_ply_for_deletion: true
  large_part_threshold: 0.35

phase5:
  num_views: 40
