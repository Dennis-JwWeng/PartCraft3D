ckpt_root: /Node11_nvme/wjw/3D_Editing/PartCraft3D/checkpoints
blender: /Node11_nvme/artgen/lac/.tools/blender-4.2.0-linux-x64/blender
data:
  output_dir: /Node11_nvme/wjw/3D_Editing/data/outputs/pipeline_v2_shard01
  mesh_root: /Node11_nvme/wjw/3D_Editing/data/inputs/partverse/mesh
  images_root: /Node11_nvme/wjw/3D_Editing/data/inputs/partverse/images
  slat_dir: /Node11_nvme/wjw/3D_Editing/data/inputs/partverse/slat
  normalized_glb_dir: null
  anno_dir: null
pipeline:
  gpus:
  - 4
  - 5
  - 6
  - 7
  prerender_workers: 8
  vlm_port_base: 8002
  vlm_port_stride: 10
  flux_port_base: 8004
  flux_port_stride: 1
  stages:
  - name: A
    desc: phase1 VLM + QC-A
    servers: vlm
    steps:
    - s1
    - sq1
  - name: C
    desc: FLUX 2D
    servers: flux
    steps:
    - s4
  - name: D
    desc: TRELLIS 3D edit
    servers: none
    steps:
    - s5
    use_gpus: true
    parallel_group: D+D2
  - name: D2
    desc: deletion GLB masking + add meta
    servers: none
    steps:
    - s5b
    parallel_group: D+D2
  - name: E_pre
    desc: 5-view preview render
    servers: none
    steps:
    - s6p
    use_gpus: true
  - name: E_qc
    desc: QC-E final (all types)
    servers: vlm
    steps:
    - sq3
  - name: E
    desc: 3D render + del encode
    servers: none
    steps:
    - s6
    - s6b
    use_gpus: true
services:
  vlm:
    model: Qwen3.5-27B
  image_edit:
    enabled: true
    trellis_text_ckpt: checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    base_urls:
    - http://localhost:8004
    - http://localhost:8005
    - http://localhost:8006
    - http://localhost:8007
    workers_per_server: 2
    export_ply: false
    export_ply_for_deletion: true
    large_part_threshold: 0.35
step_params:
  s5:
    num_views: 40
qc:
  vlm_score_threshold: 0.7
  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
