# Promote rule: deletion edits ONLY, gated by text-alignment (new v3 Gate A)
# rerun on top of v2 outputs via scripts/cleaning/run_gate_text_align_on_v2.py.
#
# This is the focused first-cut: del is the "ground truth" branch — its mesh
# is built by direct subtraction (mesh_deletion._delete_parts_from_glbs), so
# Gate A is the only quality signal we need. Additions (which inherit Gate A
# from their source del; see source_v2._addition_source_del_map) are handled
# separately by promote_v1_addel_textalign.yaml.
v1_root: data/partverse_edit_v1

promote_rules:
  required_passes:
    - gate_text_align
  edit_types_allowed:
    - deletion

source_layouts:
  v2:
    objects_glob: "objects/*/*"
    edit_status_relpath: "edit_status.json"
  v3:
    objects_glob: "*/objects/*/*"
    edit_status_relpath: "edit_status.json"

before_assets:
  view_indices: [89, 90, 91, 100, 8]
  img_enc_root: data/partverse/img_Enc
  slat_root:    data/partverse/inputs/slat

link_mode: hardlink
