v1_root: data/partverse_edit_v1

promote_rules:
  required_passes:
    - gate_text_align
    - gate_quality
  edit_types_allowed:
    - deletion
    - addition
    - modification
    - scale
    - material
    - color
    - glb

source_layouts:
  v2:
    objects_glob: "objects/*/*"
    edit_status_relpath: "edit_status.json"
  v3:
    objects_glob: "*/objects/*/*"
    edit_status_relpath: "edit_status.json"

before_assets:
  view_indices: [89, 90, 91, 100, 8]
  image_npz_root: data/partverse/inputs/images   # NPZ of canonical-view PNGs
  img_enc_root:    data/partverse/img_Enc          # legacy fallback (per-frame PNGs, RGBA, no bg)
  slat_root:    data/partverse/inputs/slat

link_mode: hardlink   # hardlink | symlink | copy
# Source runs that must never contribute records to v1.  shard05 was processed
# against an upside-down ``phase1/overview.png`` from the historical Y/Z swap
# bug in the partverse pre-rendering — every Gate A verdict (and the parsed
# parts/edits the VLM produced) is therefore unreliable.  Re-promote only
# after the upstream NPZ is re-rendered or the mesh is re-aligned.
source_blocklist:
  - pipeline_v2_shard05
