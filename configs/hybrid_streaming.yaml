# PartCraft3D Configuration — Hybrid Streaming
# Image editing: local GPU (FLUX.2-klein-9B via diffusers HTTP server, 4-step)
# VLM calls:     remote API (Gemini 2.5 Flash)
# Mode:          --streaming (per-object full pipeline, no cross-object swaps)
#
# Required services:
#   1. Image edit server (local GPU):
#        conda activate qwen_test
#        CUDA_VISIBLE_DEVICES=2 python scripts/tools/image_edit_server.py  # port 8001
#   2. Pipeline (streaming mode):
#        conda activate partcraft3d
#        ATTN_BACKEND=xformers python scripts/run_streaming.py \
#            --config configs/hybrid_streaming.yaml --tag v1

data:
  image_npz_dir: "data/partobjaverse_tiny/images"
  mesh_npz_dir: "data/partobjaverse_tiny/mesh"
  shards: ["00"]
  output_dir: "outputs/partobjaverse_tiny"

# ── Phase 0: Semantic labeling (API) ─────────────────────────────────────
phase0:
  vlm_backend: "api"
  vlm_model: "gemini-3.1-flash-lite-preview"
  vlm_base_url: "https://llm-api.mmchat.xyz/v1"
  vlm_api_key: "sk-live-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJNZXRhQ2hhdCIsInN1YiI6IjY5YWViNjBjMTk2MzA4YzNlNDJiZTlhYyIsImNsaWVudF9pZCI6IjdmZGFkZDY1MDM5MGU0ZDZiZTg3OGQ0NzFiNGFkMjY5IiwiaWF0IjoxNzczMDYwODE1fQ.gohorU2KohC_lBq2DzGG9S4oGnIVbhB9R-g4nIVlwKA"
  views_for_labeling: [32, 33, 34, 35]
  max_workers: 8
  batch_size: 50
  cache_dir: "cache/phase0"

# ── Phase 1: Edit planning ───────────────────────────────────────────────
phase1:
  min_parts_per_object: 2
  max_parts_per_object: 50
  core_categories: ["body", "torso", "base", "frame", "main", "head", "wall", "floor"]
  max_swap_candidates: 5
  min_cluster_size: 50
  cache_dir: "cache/phase1"

# ── Phase 2: Mesh assembly (skipped in streaming mode) ───────────────────
phase2:
  alignment_strategy: "contact"
  max_scale_ratio: 3.0
  max_penetration: 0.3
  max_gap_distance: 0.15
  require_same_object_type: true
  max_part_size_ratio: 5.0
  cache_dir: "cache/phase2"

# ── Pipeline global ──────────────────────────────────────────────────────
pipeline:
  attn_backend: "xformers"

# ── Phase 2.5: TRELLIS editing (local image edit, inline in streaming) ───
phase2_5:
  enabled: true
  trellis_text_ckpt: "checkpoints/TRELLIS-text-xlarge"
  trellis_image_ckpt: "checkpoints/TRELLIS-image-large"
  num_combinations: 2
  seed: 42
  cache_dir: "cache/phase2_5"
  max_refine: 1000
  output_format: "glb"
  # 2D image editing — LOCAL (diffusers HTTP server on GPU)
  image_edit_backend: "local_diffusers"
  image_edit_base_url: "http://localhost:8001"
  image_edit_enabled: true
  image_edit_workers: 2
  num_edit_views: 8

# ── Phase 3: Quality scoring (API) ───────────────────────────────────────
phase3:
  cache_dir: "cache/phase3"
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  min_area_ratio: 0.1
  max_area_ratio: 8.0
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  edit_ratio_precision: 4
  min_part_proportion: 0.005
  max_part_proportion: 0.80
  max_components: 5
  min_vertices: 50
  min_extent: 0.0001
  max_center_drift: 0.3
  min_bbox_iou: 0.1
  check_vertex_color: true
  max_penetration: 0.3
  max_gap_ratio: 0.15
  max_scale_ratio: 3.0
  instructions_per_edit: 3
  num_views: 12
  resolution: 518
  blender_path: "blender"

# ── Phase 4: Instruction generation (no API calls) ──────────────────────
phase4:
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  max_components: 5
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  instructions_per_edit: 3
  cache_dir: "cache/phase4"

logging:
  level: "INFO"
  log_dir: "logs"