# PartCraft3D Configuration — Hybrid Streaming
#
# TRELLIS weights: default under project checkpoints/ (see ckpt_root).
#
ckpt_root: checkpoints
data:
  image_npz_dir: data/partobjaverse_tiny/images
  mesh_npz_dir: data/partobjaverse_tiny/mesh
  shards:
  - '00'
  output_dir: outputs/partobjaverse_tiny
phase1:
  min_parts_per_object: 2
  max_parts_per_object: 50
  core_categories:
  - body
  - torso
  - base
  - frame
  - main
  - head
  - wall
  - floor
  max_swap_candidates: 5
  min_cluster_size: 50
  cache_dir: cache/phase1
phase2:
  alignment_strategy: contact
  max_scale_ratio: 3.0
  max_penetration: 0.3
  max_gap_distance: 0.15
  require_same_object_type: true
  max_part_size_ratio: 5.0
  cache_dir: cache/phase2
pipeline:
  attn_backend: xformers
phase3:
  cache_dir: cache/phase3
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  min_area_ratio: 0.1
  max_area_ratio: 8.0
  min_edit_ratio: 0.02
  max_edit_ratio: 0.7
  edit_ratio_precision: 4
  min_part_proportion: 0.005
  max_part_proportion: 0.8
  max_components: 5
  min_vertices: 50
  min_extent: 0.0001
  max_center_drift: 0.3
  min_bbox_iou: 0.1
  check_vertex_color: true
  max_penetration: 0.3
  max_gap_ratio: 0.15
  max_scale_ratio: 3.0
  instructions_per_edit: 3
  num_views: 12
  resolution: 518
  blender_path: blender
phase4:
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  max_components: 5
  min_edit_ratio: 0.02
  max_edit_ratio: 0.7
  instructions_per_edit: 3
  cache_dir: cache/phase4
logging:
  level: INFO
  log_dir: logs
services:
  vlm:
    vlm_backend: api
    vlm_model: gemini-3.1-flash-lite-preview
    vlm_base_url: https://llm-api.mmchat.xyz/v1
    vlm_api_key: sk-live-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJNZXRhQ2hhdCIsInN1YiI6IjY5YWViNjBjMTk2MzA4YzNlNDJiZTlhYyIsImNsaWVudF9pZCI6IjdmZGFkZDY1MDM5MGU0ZDZiZTg3OGQ0NzFiNGFkMjY5IiwiaWF0IjoxNzczMDYwODE1fQ.gohorU2KohC_lBq2DzGG9S4oGnIVbhB9R-g4nIVlwKA
    views_for_labeling:
    - 32
