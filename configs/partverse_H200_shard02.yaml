# PartVerse shard02 — H200 (8× NVIDIA L20X 48GB)
# Machine env: configs/machine/H200.env
#
# ── 启动方式 ────────────────────────────────────────────────────────
# 一键批处理（推荐）：
#   SHARD=00 BASE_CONFIG=configs/partverse_H200_shard02.yaml \
#       bash scripts/tools/run_shard_batch_pipeline.sh
#
# 手动分步：
#   1) VLM 服务（pipeline_server 环境，TP=1，8 实例占 GPU 0-7）：
#      conda activate pipeline_server
#      for gpu in $(seq 0 7); do
#        CUDA_VISIBLE_DEVICES=$gpu VLM_MODEL=/mnt/zsn/ckpts/Qwen3.5-27B \
#            VLM_PORT=$((8003+gpu)) VLM_TP=1 bash scripts/tools/launch_local_vlm.sh &
#      done
#      # GPU 0→8003, 1→8004, …, 7→8010
#
#   2) 图像编辑服务（pipeline_server 环境，GPU 0-7，8 实例）：
#      conda activate pipeline_server
#      for gpu in $(seq 0 7); do
#        CUDA_VISIBLE_DEVICES=$gpu python scripts/tools/image_edit_server.py \
#            --model /mnt/zsn/ckpts/FLUX.2-klein-9B --port $((8004+gpu)) &
#      done
#      # GPU 0→8004, 1→8005, …, 7→8011
#
#   3) 管线（vinedresser3d 环境）：
#      conda activate vinedresser3d
#      python scripts/run_pipeline.py \
#          --config configs/partverse_H200_shard02.yaml \
#          --shard 00 --steps 4 --gpus 0 1 2 3 4 5 6 7

# ── Checkpoints ─────────────────────────────────────────────────────
# TRELLIS 权重在项目 checkpoints/ 下；VLM/FLUX 权重路径见 H200.env
ckpt_root: "/root/workspace/PartCraft3D/checkpoints"

# ── Data & Output ───────────────────────────────────────────────────
data:
  data_dir:                "/mnt/zsn/data/partverse"
  derive_dataset_subpaths: true
  shards:                  ["02"]
  output_by_shard:         true
  output_dir:              "/mnt/zsn/data/partverse/outputs/partverse"

# ── Phase 0: VLM 语义标注 ──────────────────────────────────────────
phase0:
  vlm_backend:             "local"
  vlm_model:               "Qwen3.5-27B"
  vlm_base_url:            "http://localhost:8003/v1"
  vlm_base_urls:           # 8 实例，TP=1，端口 8003-8010
    - "http://localhost:8003/v1"
    - "http://localhost:8004/v1"
    - "http://localhost:8005/v1"
    - "http://localhost:8006/v1"
    - "http://localhost:8007/v1"
    - "http://localhost:8008/v1"
    - "http://localhost:8009/v1"
    - "http://localhost:8010/v1"
  vlm_api_key:             "dummy"
  local_model_path:        "/mnt/zsn/ckpts/Qwen3.5-27B"
  local_base_url:          "http://localhost:8003/v1"
  local_gpu_ids:           "0"
  local_max_model_len:     32768
  local_tensor_parallel:   1
  views_for_labeling:      [32, 33, 34, 35]
  max_workers:             32
  batch_size:              100
  cache_dir:               "cache/phase0"

# ── Phase 1: 编辑规划 ──────────────────────────────────────────────
phase1:
  min_parts_per_object:          2
  max_parts_per_object:          50
  core_categories:               ["body", "torso", "base", "frame", "main", "head", "wall", "floor"]
  max_swap_candidates:           5
  min_cluster_size:              50
  max_scale_edits_per_part:      1
  max_material_edits_per_part:   1
  max_identity_edits_per_object: 1
  max_global_edits_per_object:   3
  cache_dir:                     "cache/phase1"

# ── Phase 2: 对齐 ──────────────────────────────────────────────────
phase2:
  alignment_strategy:      "contact"
  max_scale_ratio:         3.0
  max_penetration:         0.3
  max_gap_distance:        0.15
  require_same_object_type: true
  max_part_size_ratio:     5.0
  cache_dir:               "cache/phase2"

# ── Pipeline 全局 ──────────────────────────────────────────────────
pipeline:
  attn_backend:            "flash_attn"
  lookahead_objects:       0

# ── Phase 2.5: TRELLIS 3D 编辑 + 2D 图像编辑 ──────────────────────
phase2_5:
  enabled:                     true
  trellis_text_ckpt:           "checkpoints/TRELLIS-text-xlarge"
  trellis_image_ckpt:          "checkpoints/TRELLIS-image-large"
  export_ply:                  false         # 只写 SLAT，节省磁盘
  export_ply_for_deletion:     false         # deletion 也不写 PLY
  num_combinations:            1
  seed:                        42
  cache_dir:                   "cache/phase2_5"
  max_refine:                  1000
  output_format:               "glb"
  image_edit_backend:          "local_diffusers"
  image_edit_base_url:         "http://localhost:8004"
  image_edit_base_urls:        # 8 实例，每卡一个，端口 8004-8011
    - "http://localhost:8004"   # GPU 0
    - "http://localhost:8005"   # GPU 1
    - "http://localhost:8006"   # GPU 2
    - "http://localhost:8007"   # GPU 3
    - "http://localhost:8008"   # GPU 4
    - "http://localhost:8009"   # GPU 5
    - "http://localhost:8010"   # GPU 6
    - "http://localhost:8011"   # GPU 7
  image_edit_enabled:          true
  image_edit_workers:          16      # 8 servers × 2 workers
  image_edit_workers_per_server: 2
  num_edit_views:              8

# ── Phase 3: 质量评估 ──────────────────────────────────────────────
phase3:
  cache_dir:                   "cache/phase3"
  vlm_max_tokens:              4096
  vlm_json_response_format:    false
  vlm_mesh_prefilter:          true
  vlm_mesh_prefilter_min_vertices: 8
  min_volume_ratio:            0.15
  max_volume_ratio:            5.0
  min_area_ratio:              0.1
  max_area_ratio:              8.0
  min_edit_ratio:              0.02
  max_edit_ratio:              0.70
  edit_ratio_precision:        4
  min_part_proportion:         0.005
  max_part_proportion:         0.80
  max_components:              5
  min_vertices:                50
  min_extent:                  0.0001
  max_center_drift:            0.3
  min_bbox_iou:                0.1
  check_vertex_color:          false
  max_penetration:             0.3
  max_gap_ratio:               0.15
  max_scale_ratio:             3.0
  instructions_per_edit:       3
  num_views:                   12
  resolution:                  518
  blender_path:                "/usr/local/bin/blender"

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:    "INFO"
  log_dir:  "logs"
