# Pipeline v2 — 本机：仓库根目录下 `data/`、`outputs/` 为软链到真实磁盘。
# 约定：在仓库根执行命令（run_pipeline_v2_shard.sh 会 cd 到仓库根），相对路径解析到软链目标。
#
# 软链示例（把路径换成你本机实际目录）:
#   cd "$PARTCRAFT_REPO_ROOT"
#   ln -sfn /your/fast_nvme/partverse_data data
#   ln -sfn /your/fast_nvme/partverse_runs outputs
#
# 数据契约（见 docs/ARCH.md）: `data/partverse/mesh/<shard>/*.npz`、`data/partverse/images/<shard>/*.npz`
#
# 运行测试（与 ARCH.md 主入口一致）:
#   # 1) 准备 machine env（复制为 configs/machine/$(hostname).env 并改路径；或见下方 MACHINE_ENV）
#   # 2) 干跑（只列对象与 manifest，不写模型）
#   python -m partcraft.pipeline_v2.run --config configs/pipeline_v2_local_symlink.yaml --shard 01 --all --dry-run
#   # 3) 单阶段 smoke（需对应服务已按 scheduler 端口启动）
#   PHASES=A bash scripts/tools/run_pipeline_v2_shard.sh local01 configs/pipeline_v2_local_symlink.yaml
#   # 少量对象：python -m partcraft.pipeline_v2.run --config ... --shard 01 --obj-ids OBJ1 OBJ2 --phase A
#
# 若 hostname 的 .env 尚未创建，可临时指定模板:
#   MACHINE_ENV=configs/machine/local_symlink.env.example bash scripts/tools/run_pipeline_v2_shard.sh ...

# 权重根：相对仓库根；也可改成绝对路径。
ckpt_root: checkpoints
blender: /usr/local/bin/blender
data:
  output_dir: outputs/pipeline_v2_local
  mesh_root: data/partverse/mesh
  images_root: data/partverse/images
pipeline:
  gpus:
  - 0
  prerender_workers: 4
  n_vlm_servers: 1
  vlm_port_base: 8002
  vlm_port_stride: 10
  flux_port_base: 8004
  flux_port_stride: 1
  stages:
  - name: A
    desc: phase1 VLM
    servers: vlm
    steps:
    - s1
  - name: B
    desc: highlights
    servers: none
    steps:
    - s2
    optional: true
  - name: C
    desc: FLUX 2D
    servers: flux
    steps:
    - s4
  - name: D
    desc: TRELLIS 3D edit
    servers: none
    steps:
    - s5
    use_gpus: true
  - name: D2
    desc: deletion mesh
    servers: none
    steps:
    - s5b
  - name: E
    desc: 3D rerender
    servers: none
    steps:
    - s6
    - s6b
    use_gpus: true
  - name: F
    desc: addition backfill
    servers: none
    steps:
    - s7
services:
  vlm:
    model: Qwen3.5-27B
  image_edit:
    enabled: true
    trellis_text_ckpt: checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    workers_per_server: 2
    export_ply: false
    export_ply_for_deletion: true
    large_part_threshold: 0.35
step_params:
  s5:
    num_views: 40
