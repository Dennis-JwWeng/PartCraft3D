# Pipeline v3 — Mode E downstream test (shard 08, 20 objects)
#
# Purpose: test del_mesh → preview_del → gate_quality on top of the
#          already-computed mode_e_text_align gate_a results.
#
# Prereq: run scripts/tools/migrate_mode_e_to_v3.py first to copy
#         each object's phase1/edit_status.json to the object root.
#
# Typical invocation:
#   python -m partcraft.pipeline_v3.run \
#       --config configs/pipeline_v3_shard08_downstream_test.yaml \
#       --shard 08 \
#       --steps del_mesh,preview_del,gate_quality \
#       --all

blender: /mnt/zsn/data/3DEditVerse/render_package_extracted/render_package/blender-3.5.1-linux-x64/blender

data:
  # output_dir points at the mode_e bench directory so that pipeline_v3
  # writes edits_3d/ and other artifacts alongside the existing phase1/ data.
  output_dir: /mnt/zsn/zsn_workspace/PartCraft3D/data/partverse/outputs/partverse/bench_shard08/mode_e_text_align

  mesh_root:   /mnt/zsn/data/partverse/bench/inputs/mesh
  images_root: /mnt/zsn/data/partverse/bench/inputs/images

  # normalized_glb_dir not needed — s5b (del_mesh) reads geometry directly
  # from the mesh.npz packed file.
  # anno_dir not needed — no anno-based part filtering required.

pipeline:
  gpus: []          # del_mesh and preview_del are CPU-only; gate_quality uses VLM
  prerender_workers: 4
  s6p_del_workers: 4

  # Prerequisite wiring: gate_text_align must pass before del_mesh / preview_del.
  # Build prereq_map reads step names from stages[].steps.
  stages:
  - name: downstream
    desc: deletion mesh + preview + quality gate
    servers: none
    steps:
    - gate_text_align   # sentinel: wires gate_a prereq in build_prereq_map
    - del_mesh
    - preview_del
    - gate_quality

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.5-27B
    base_urls:
    - http://localhost:8102/v1

  image_edit:
    # FLUX image-edit service.  Start on an available GPU with:
    #   CUDA_VISIBLE_DEVICES=4 python scripts/run_flux_server.py --port 8020
    # Then pass --flux-url http://localhost:8020 to the run command.
    enabled: true
    trellis_text_ckpt: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    base_urls:
    - http://localhost:8020
    workers_per_server: 1
    export_ply: false
    export_ply_for_deletion: false
    large_part_threshold: 0.35
    repaint_mode: image

qc:
  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
