# PartCraft3D Configuration — Local Deployment (zero API cost)
# Uses locally deployed models instead of Gemini API.
#
# Required services:
#   1. SGLang — Qwen3.5-27B on port 8002 (semantic labeling, enrichment, quality)
#   2. Image edit server — Qwen-Image-Edit-2511 on port 8001 (2D editing)
#
# Quick start:
#   Terminal 1 (VLM):
#     conda activate pipeline_server
#     CUDA_VISIBLE_DEVICES=0 bash scripts/tools/launch_local_vlm.sh  # port 8002
#   Terminal 2 (image edit):
#     conda activate pipeline_server
#     python scripts/tools/image_edit_server.py --gpu 2               # port 8001
#   Terminal 3 (pipeline):
#     conda activate pipeline_server
#     ATTN_BACKEND=xformers python scripts/run_pipeline.py \
#         --config configs/local_sglang.yaml --tag v1

data:
  # PartCraft NPZ format (generated by datasets/partobjaverse/pack_npz.py)
  image_npz_dir: "data/partobjaverse_tiny/images"
  mesh_npz_dir: "data/partobjaverse_tiny/mesh"
  shards: ["00"]
  output_dir: "outputs/partobjaverse_tiny"
  # Pre-encoded SLAT (generated by datasets/partobjaverse/prerender.py)
  # Omit to use default: data/partobjaverse_tiny/slat/
  slat_dir: "data/partobjaverse_tiny/slat"
  img_enc_dir: "data/partobjaverse_tiny/img_Enc"
  
phase0:
  vlm_backend: "local"
  vlm_model: "/mnt/zsn/ckpts/Qwen3.5-27B"
  vlm_base_url: "http://localhost:8002/v1"
  vlm_api_key: "dummy"                   # SGLang accepts any key
  local_model_path: "/mnt/zsn/ckpts/Qwen3.5-27B"
  local_base_url: "http://localhost:8002/v1"
  local_gpu_ids: "0"
  local_max_model_len: 32768
  local_tensor_parallel: 1

  views_for_labeling: [32, 33, 34, 35]
  max_workers: 2          # local GPU: fewer workers to avoid OOM
  batch_size: 50
  cache_dir: "cache/phase0"

phase1:
  min_parts_per_object: 2
  max_parts_per_object: 50
  core_categories: ["body", "torso", "base", "frame", "main", "head", "wall", "floor"]
  max_swap_candidates: 5
  min_cluster_size: 50
  cache_dir: "cache/phase1"

phase2:
  alignment_strategy: "contact"
  max_scale_ratio: 3.0
  max_penetration: 0.3
  max_gap_distance: 0.15
  require_same_object_type: true
  max_part_size_ratio: 5.0
  cache_dir: "cache/phase2"

pipeline:
  attn_backend: "xformers"             # TRELLIS attention backend (xformers | flash-attn)

phase2_5:
  enabled: true
  trellis_text_ckpt: "checkpoints/TRELLIS-text-xlarge"
  trellis_image_ckpt: "checkpoints/TRELLIS-image-large"
  num_combinations: 2
  seed: 42
  cache_dir: "cache/phase2_5"
  max_refine: 1000
  output_format: "glb"
  # 2D image editing — local HTTP server (start separately in qwen_test env)
  # Start:  conda activate qwen_test && python scripts/tools/image_edit_server.py --gpu 2
  image_edit_backend: "local_diffusers"
  image_edit_base_url: "http://localhost:8001"
  image_edit_enabled: true
  image_edit_workers: 2
  num_edit_views: 8

phase3:
  cache_dir: "cache/phase3"
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  min_area_ratio: 0.1
  max_area_ratio: 8.0
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  edit_ratio_precision: 4
  min_part_proportion: 0.005
  max_part_proportion: 0.80
  max_components: 5
  min_vertices: 50
  min_extent: 0.0001
  max_center_drift: 0.3
  min_bbox_iou: 0.1
  check_vertex_color: true
  max_penetration: 0.3
  max_gap_ratio: 0.15
  max_scale_ratio: 3.0
  instructions_per_edit: 3
  num_views: 12
  resolution: 518
  blender_path: "blender"

phase4:
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  max_components: 5
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  instructions_per_edit: 3
  cache_dir: "cache/phase4"

logging:
  level: "INFO"
  log_dir: "logs"
