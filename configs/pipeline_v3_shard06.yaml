# Pipeline v3 — Mode E full shard06 (1203 objects)
#
# Inputs  : /mnt/zsn/zsn_workspace/PartCraft3D/data/partverse/inputs/{mesh,images,slat}/06
# Output  : /mnt/zsn/zsn_workspace/PartCraft3D/outputs/partverse/shard06/mode_e_text_align
# Runner  : scripts/tools/run_pipeline_v3_shard.sh (uses --all by default)
#
# Stages (run only up to — and NOT including — gate_quality):
#   text_gen_gate_a  : n_gpus VLM servers  (ports 8200-8205)
#   del_mesh         : CPU only   (parallel with flux_2d)
#   flux_2d          : n_gpus FLUX servers (ports 8020-8025)
#   trellis_preview  : n_gpus Trellis workers via dispatch_gpus
#   gate_quality     : VLM collage scoring   <- run separately
#
# Typical invocation:
#   STAGES=text_gen_gate_a,del_mesh,flux_2d,trellis_preview \
#   SHARD=06 \
#   MACHINE_ENV=configs/machine/dedicated-developjob-saining-r0iyw.env \
#     bash scripts/tools/run_pipeline_v3_shard.sh shard06 \
#          configs/pipeline_v3_shard06.yaml

blender: /mnt/zsn/data/3DEditVerse/render_package_extracted/render_package/blender-3.5.1-linux-x64/blender
ckpt_root: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints

data:
  output_dir:  /mnt/zsn/zsn_workspace/PartCraft3D/outputs/partverse/shard06/mode_e_text_align
  mesh_root:   /mnt/zsn/zsn_workspace/PartCraft3D/data/partverse/inputs/mesh
  images_root: /mnt/zsn/zsn_workspace/PartCraft3D/data/partverse/inputs/images
  slat_dir:    /mnt/zsn/zsn_workspace/PartCraft3D/data/partverse/inputs/slat

pipeline:
  # Default to all 8 GPUs (mirrors the recent shard08 layout). If GPU 0
  # is occupied by an external job (e.g. Ori3DEdit ~45 GB resident), drop
  # it and rerun with `gpus: [1,2,3,4,5,6,7]` — VLM/FLUX servers will
  # not fit beside ~45 GB of resident state on a single card.
  gpus: [0, 1, 2, 3, 4, 5, 6, 7]
  vlm_port_base:  8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1
  prerender_workers: 12
  s6p_del_workers: 12

  stages:
  - name: text_gen_gate_a
    desc: VLM edit generation + text-align gate
    servers: vlm
    steps:
    - gen_edits
    - gate_text_align

  - name: del_mesh
    desc: Deletion mesh masking (CPU). Produces del_*/after_new.glb plus
      add_*/meta.json — terminal for the deletion/addition data branch
      (no rendering needed unless preview_del is opted in).
    servers: none
    parallel_group: edit_branches
    steps:
    - del_mesh

  - name: flux_2d
    desc: FLUX 2D image editing (modification / style / material / scale /
      colour / global / addition).
    servers: flux
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 0
    steps:
    - flux_2d

  - name: trellis_preview
    desc: Trellis 3D reconstruction + 5-view preview. Chained AFTER flux_2d
      (chain_id=flux_chain) so Trellis can claim GPUs once FLUX servers
      shut down. Runs in parallel with the del_mesh chain.
    servers: none
    use_gpus: true
    parallel_group: edit_branches
    chain_id: flux_chain
    chain_order: 1
    steps:
    - trellis_3d
    - preview_flux

  # preview_del is optional. It only matters if you plan to feed deletion
  # edits into gate_quality. Enable explicitly via STAGES=...,preview_del,...
  - name: preview_del
    desc: Optional Blender 5-view preview of after_new.glb (deletion/addition
      edits). Only needed when gate_quality runs on deletion edits.
    servers: none
    optional: true
    steps:
    - preview_del

  - name: gate_quality
    desc: VLM visual quality gate
    servers: vlm
    steps:
    - gate_quality

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.5-27B

  image_edit:
    enabled: true
    trellis_text_ckpt: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    workers_per_server: 2
    trellis_workers_per_gpu: 1
    export_ply: false
    export_ply_for_deletion: false
    large_part_threshold: 0.35
    repaint_mode: image

qc:
  # Restrict Gate E to a subset of edit types.  Useful when del/add previews
  # are still being rendered (preview_del) and we want to start judging the
  # FLUX-derived edits early.  Override per-invocation via env QC_ONLY_TYPES.
  # Set to null / remove to judge all 7 types.
  gate_quality_types: [modification, scale, material, color, global]
  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
