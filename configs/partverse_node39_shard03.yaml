# PartVerse shard03 — node39 (8× A800 80 GB)
# Machine env: configs/machine/node39.env
#
# ── 启动方式 ────────────────────────────────────────────────────────
# 一键批处理（推荐）：
#   SHARD=01 bash scripts/tools/run_shard_batch_pipeline.sh
#
# 手动分步：
#   1) VLM 服务（qwen_test 环境，GPU 0）：
#      conda activate qwen_test
#      CUDA_VISIBLE_DEVICES=0 VLM_MODEL=/Node11_nvme/zsn/checkpoints/Qwen3.5-27B \
#          bash scripts/tools/launch_local_vlm.sh
#
#   2) 图像编辑服务（qwen_test 环境，GPU 0,4,5,6,7）：
#      conda activate qwen_test
#      for gpu in 0 4 5 6 7; do
#        CUDA_VISIBLE_DEVICES=$gpu python scripts/tools/image_edit_server.py \
#            --ckpt /Node11_nvme/wjw/checkpoints/FLUX.2-klein-9B --port $((8004+gpu)) &
#      done
#
#   3) 管线（vinedresser3d 环境）：
#      conda activate vinedresser3d
#      python scripts/run_pipeline.py \
#          --config configs/partverse_node39_shard03.yaml \
#          --shard 03 --steps 4 --gpus 0 4 5 6 7

# ── Checkpoints ─────────────────────────────────────────────────────
# TRELLIS 权重在项目 checkpoints/ 下；VLM/FLUX 权重路径见 node39.env
ckpt_root: "/Node11_nvme/wjw/3D_Editing/PartCraft3D/checkpoints"

# ── Data & Output ───────────────────────────────────────────────────
data:
  data_dir:               "/Node11_nvme/wjw/3D_Editing/PartCraft3D/data/partverse"
  derive_dataset_subpaths: true
  shards:                 ["03"]
  output_by_shard:        true
  output_dir:             "/Node11_nvme/wjw/3D_Editing/PartCraft3D/outputs/partverse"

# ── Phase 0: VLM 语义标注 ──────────────────────────────────────────
phase0:
  vlm_backend:            "local"
  vlm_model:              "Qwen3.5-27B"
  vlm_base_url:           "http://localhost:8002/v1"
  vlm_base_urls:
    - "http://localhost:8002/v1"
  vlm_api_key:            "dummy"
  local_model_path:       "/Node11_nvme/zsn/checkpoints/Qwen3.5-27B"
  local_base_url:         "http://localhost:8002/v1"
  local_gpu_ids:          "0"
  local_max_model_len:    32768
  local_tensor_parallel:  1
  views_for_labeling:     [32, 33, 34, 35]
  max_workers:            32
  batch_size:             100
  cache_dir:              "cache/phase0"

# ── Phase 1: 编辑规划 ──────────────────────────────────────────────
phase1:
  min_parts_per_object:          2
  max_parts_per_object:          50
  core_categories:               ["body", "torso", "base", "frame", "main", "head", "wall", "floor"]
  max_swap_candidates:           5
  min_cluster_size:              50
  max_scale_edits_per_part:      1
  max_material_edits_per_part:   1
  max_identity_edits_per_object: 1
  max_global_edits_per_object:   3
  cache_dir:                     "cache/phase1"

# ── Phase 2: 对齐 ──────────────────────────────────────────────────
phase2:
  alignment_strategy:    "contact"
  max_scale_ratio:       3.0
  max_penetration:       0.3
  max_gap_distance:      0.15
  require_same_object_type: true
  max_part_size_ratio:   5.0
  cache_dir:             "cache/phase2"

# ── Pipeline 全局 ──────────────────────────────────────────────────
pipeline:
  attn_backend:          "xformers"
  lookahead_objects:     0

# ── Phase 2.5: TRELLIS 3D 编辑 + 2D 图像编辑 ──────────────────────
phase2_5:
  enabled:                    true
  trellis_text_ckpt:          "checkpoints/TRELLIS-text-xlarge"
  trellis_image_ckpt:         "checkpoints/TRELLIS-image-large"
  export_ply:                 false          # 默认只写 SLAT，节省磁盘
  export_ply_for_deletion:    true           # deletion 仍保留 PLY
  num_combinations:           1
  seed:                       42
  cache_dir:                  "cache/phase2_5"
  max_refine:                 1000
  output_format:              "glb"
  image_edit_backend:         "local_diffusers"
  image_edit_base_url:        "http://localhost:8004"
  image_edit_base_urls:
    - "http://localhost:8004"
    - "http://localhost:8005"
    - "http://localhost:8006"
    - "http://localhost:8007"
    - "http://localhost:8008"
  image_edit_enabled:         true
  image_edit_workers:         10
  image_edit_workers_per_server: 2
  num_edit_views:             8

# ── Phase 3: 质量评估 ──────────────────────────────────────────────
phase3:
  cache_dir:                  "cache/phase3"
  vlm_max_tokens:             4096
  vlm_json_response_format:   false
  vlm_mesh_prefilter:         true
  vlm_mesh_prefilter_min_vertices: 8
  min_volume_ratio:           0.15
  max_volume_ratio:           5.0
  min_area_ratio:             0.1
  max_area_ratio:             8.0
  min_edit_ratio:             0.02
  max_edit_ratio:             0.70
  edit_ratio_precision:       4
  min_part_proportion:        0.005
  max_part_proportion:        0.80
  max_components:             5
  min_vertices:               50
  min_extent:                 0.0001
  max_center_drift:           0.3
  min_bbox_iou:               0.1
  check_vertex_color:         false
  max_penetration:            0.3
  max_gap_ratio:              0.15
  max_scale_ratio:            3.0
  instructions_per_edit:      3
  num_views:                  12
  resolution:                 518
  blender_path:               "/Node11_nvme/artgen/lac/.tools/blender-4.2.0-linux-x64/blender"

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:    "INFO"
  log_dir:  "logs"
