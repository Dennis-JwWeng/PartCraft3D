# PartCraft3D Configuration — Local Qwen3-VL on GPU
# Saves API token costs by running VLM locally via vLLM/SGLang.
#
# Quick start:
#   1. Install vLLM:  pip install vllm>=0.6.0
#   2. Launch server:  bash scripts/launch_local_vlm.sh
#   3. Run pipeline:   python scripts/run_phase0.py --config configs/local_vlm.yaml

data:
  image_npz_dir: "/Node11_nvme/zsn/test_data/part/images"
  mesh_npz_dir: "/Node11_nvme/zsn/test_data/part/mesh"
  shards: ["00"]
  output_dir: "/Node11_nvme/wjw/3D_Editing/PartCraft3D/outputs"

phase0:
  vlm_backend: "local"
  local_model_path: "/Node11_nvme/wjw/checkpoints/Qwen3-VL-2B-Instruct"
  local_base_url: "http://localhost:8000/v1"
  local_gpu_ids: "6"
  local_max_model_len: 8192
  local_tensor_parallel: 1

  # Keep vlm_model/vlm_base_url for fallback to API
  vlm_model: "gemini-2.5-flash"
  vlm_base_url: "https://llm-api.mmchat.xyz/v1"
  vlm_api_key: ""

  views_for_labeling: [0, 10, 20, 30]
  max_workers: 2          # local GPU: fewer workers to avoid OOM
  batch_size: 50
  cache_dir: "cache/phase0"

# Other phases use the same config as default
phase1:
  min_parts_per_object: 2
  max_parts_per_object: 50
  core_categories: ["body", "torso", "base", "frame", "main"]
  max_swap_candidates: 5
  min_cluster_size: 50
  cache_dir: "cache/phase1"

phase2:
  alignment_strategy: "contact"
  max_scale_ratio: 3.0
  max_penetration: 0.3
  max_gap_distance: 0.15
  require_same_object_type: true
  max_part_size_ratio: 5.0
  cache_dir: "cache/phase2"

phase2_5:
  enabled: false
  vinedresser_path: "/Node11_nvme/wjw/3D_Editing/Vinedresser3D-main"
  num_combinations: 1
  seed: 42
  cache_dir: "cache/phase2_5"
  refine_types: ["modification"]
  max_refine: 1000

phase3:
  cache_dir: "cache/phase3"
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  min_area_ratio: 0.1
  max_area_ratio: 8.0
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  edit_ratio_precision: 4
  min_part_proportion: 0.005
  max_part_proportion: 0.80
  max_components: 5
  min_vertices: 50
  min_extent: 0.0001
  max_center_drift: 0.3
  min_bbox_iou: 0.1
  check_vertex_color: true
  max_penetration: 0.3
  max_gap_ratio: 0.15
  max_scale_ratio: 3.0
  instructions_per_edit: 3

logging:
  level: "INFO"
  log_dir: "logs"
