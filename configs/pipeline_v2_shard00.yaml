# Pipeline v2 — dedicated-developjob-saining-r0iyw (8× L20X 48GB)
# Machine env: configs/machine/dedicated-developjob-saining-r0iyw.env
#
# Usage:
#   bash scripts/tools/run_pipeline_v2_shard.sh shard00 \
#       configs/pipeline_v2_shard00.yaml
#
#   STAGES="A,C,D,D2,E,F"  bash ...   # skip highlights (stage B)
#   STAGES=A                bash ...   # only VLM stage

ckpt_root: /root/workspace/PartCraft3D/checkpoints
blender: /usr/local/bin/blender
data:
  output_dir: /mnt/zsn/data/partverse/outputs/partverse/pipeline_v2_shard00
  mesh_root: /mnt/zsn/data/partverse/mesh
  images_root: /mnt/zsn/data/partverse/images
  slat_dir: /mnt/zsn/data/partverse/slat
pipeline:
  gpus:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  prerender_workers: 8
  n_vlm_servers: 4
  vlm_port_base: 8002
  vlm_port_stride: 10
  flux_port_base: 8004
  flux_port_stride: 1
  stages:
  - name: A
    desc: phase1 VLM
    servers: vlm
    steps:
    - s1
  - name: B
    desc: highlights
    servers: none
    steps:
    - s2
    optional: true
  - name: C
    desc: FLUX 2D
    servers: flux
    steps:
    - s4
  - name: D
    desc: TRELLIS 3D edit
    servers: none
    steps:
    - s5
    use_gpus: true
  - name: D2
    desc: deletion mesh
    servers: none
    steps:
    - s5b
  - name: E
    desc: 3D rerender
    servers: none
    steps:
    - s6
    - s6b
    use_gpus: true
  - name: F
    desc: addition backfill
    servers: none
    steps:
    - s7
services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.5-27B
  image_edit:
    enabled: true
    trellis_text_ckpt: /root/workspace/PartCraft3D/checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    workers_per_server: 2
    export_ply: false
    export_ply_for_deletion: true
    large_part_threshold: 0.35
step_params:
  s5:
    num_views: 40
