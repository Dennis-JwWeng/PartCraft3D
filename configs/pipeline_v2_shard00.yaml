ckpt_root: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints
blender: /mnt/zsn/data/3DEditVerse/render_package_extracted/render_package/blender-3.5.1-linux-x64/blender
data:
  output_dir: /mnt/zsn/data/partverse/outputs/partverse/pipeline_v2_shard00
  mesh_root: /mnt/zsn/data/partverse/inputs/mesh
  images_root: /mnt/zsn/data/partverse/inputs/images
  slat_dir: /mnt/zsn/data/partverse/inputs/slat
  normalized_glb_dir: /mnt/zsn/data/partverse/source/normalized_glbs
  anno_dir: /mnt/zsn/data/partverse/source/anno_infos/anno_infos
pipeline:
  gpus:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  prerender_workers: 8
  vlm_port_base: 8002
  vlm_port_stride: 10
  flux_port_base: 8004
  flux_port_stride: 1
  stages:
  - name: A
    desc: phase1 VLM + QC-A
    servers: vlm
    steps:
    - s1
    - sq1
  - name: C
    desc: FLUX 2D
    servers: flux
    steps:
    - s4
  - name: D
    desc: TRELLIS 3D edit
    servers: none
    steps:
    - s5
    use_gpus: true
    parallel_group: D+D2
  - name: D2
    desc: deletion GLB masking + del/add preview (Blender, CPU)
    servers: none
    steps:
    - s5b
    - s6p_del
    parallel_group: D+D2
  - name: E_pre
    desc: TRELLIS-based 5-view preview (mod/scl/mat/glb)
    servers: none
    steps:
    - s6p_flux
    use_gpus: true
  - name: E_qc
    desc: QC-E final (all types)
    servers: vlm
    steps:
    - sq3
  - name: E_encode
    desc: deletion GLB encode (40 views -> after.npz)
    servers: none
    steps:
    - s6b
    use_gpus: true
  - name: E_render
    desc: 3D report render (mod/scl/mat/glb only, optional)
    servers: none
    steps:
    - s6
    use_gpus: true
    optional: true
services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.5-27B
  image_edit:
    enabled: true
    trellis_text_ckpt: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    base_urls:
    - http://localhost:8004
    - http://localhost:8005
    - http://localhost:8006
    - http://localhost:8007
    - http://localhost:8008
    - http://localhost:8009
    - http://localhost:8010
    - http://localhost:8011
    workers_per_server: 2
    export_ply: false
    export_ply_for_deletion: true
    large_part_threshold: 0.35
    repaint_mode: image
step_params:
  s5:
    num_views: 40
qc:
  vlm_score_threshold: 0.7
  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
