# Pipeline v3 — Mode E gate_quality re-run on 20-object bench (2026-04-18)
#
# Purpose: Run the *current* updated VLM gate_quality on a fully isolated copy
# of the 20 test objects from shard08, so we can evaluate the new VLM filter's
# discriminative ability without polluting the main shard08 run.
#
# Inputs: identical to pipeline_v3_shard08_test20.yaml (the same bench inputs).
# Outputs: bench_shard08_test20_gateQ_20260418/  (separate from shard08/).
#
# Use the already-running 6-instance Qwen3.5-27B server pool (ports 8200-8205).
#
# Invocation:
#   python -m partcraft.pipeline_v3.run \
#     --config configs/pipeline_v3_shard08_test20_gateQ.yaml \
#     --shard 08 --obj-ids-file configs/shard08_test20_obj_ids.txt \
#     --steps gate_quality --force

blender: /mnt/zsn/data/3DEditVerse/render_package_extracted/render_package/blender-3.5.1-linux-x64/blender
ckpt_root: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints

data:
  output_dir: /mnt/zsn/zsn_workspace/PartCraft3D/data/partverse/outputs/partverse/bench_shard08_test20_gateQ_20260418/mode_e_text_align
  mesh_root:   /mnt/zsn/data/partverse/bench/inputs/mesh
  images_root: /mnt/zsn/data/partverse/bench/inputs/images
  slat_dir:    /mnt/zsn/data/partverse/bench/inputs/slat

pipeline:
  gpus: [2, 3, 4, 5, 6, 7]
  vlm_port_base:  8200
  vlm_port_stride: 1
  flux_port_base: 8020
  flux_port_stride: 1
  prerender_workers: 6
  s6p_del_workers: 6

  stages:
  - name: gate_quality
    desc: VLM visual quality gate (re-run with current updated VLM)
    servers: vlm
    steps:
    - gate_quality

services:
  vlm:
    model: /mnt/zsn/ckpts/Qwen3.5-27B
    base_urls:
      - http://127.0.0.1:8200/v1
      - http://127.0.0.1:8201/v1
      - http://127.0.0.1:8202/v1
      - http://127.0.0.1:8203/v1
      - http://127.0.0.1:8204/v1
      - http://127.0.0.1:8205/v1

  image_edit:
    enabled: true
    trellis_text_ckpt: /mnt/zsn/zsn_workspace/PartCraft3D/checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    workers_per_server: 2
    export_ply: false
    export_ply_for_deletion: false
    large_part_threshold: 0.35
    repaint_mode: image

qc:
  thresholds_by_type:
    deletion:
      min_visual_quality: 3
    modification:
      min_visual_quality: 3
      require_preserve_other: true
    scale:
      min_visual_quality: 3
      require_preserve_other: true
    material:
      min_visual_quality: 3
    color:
      min_visual_quality: 3
    global:
      min_visual_quality: 3
    addition:
      min_visual_quality: 3
