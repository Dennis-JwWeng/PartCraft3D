# PartCraft3D Configuration — PartVerse Dataset
#
# Shard-by-shard workflow (repeat for each shard):
#
#   Step 1 — Render + encode SLAT (4 GPUs, ~1203 objects):
#     CUDA_VISIBLE_DEVICES=0,1,2,3 ATTN_BACKEND=xformers \
#         python scripts/datasets/partverse/prerender.py \
#         --shard 00 --num-shards 10 --render-workers 4
#
#   Step 2 — Pack into PartCraft NPZ format:
#     python scripts/datasets/partverse/pack_npz.py \
#         --shard 00 --num-shards 10
#
#   Step 3 — Run pipeline on this shard:
#     ATTN_BACKEND=xformers python scripts/run_streaming.py \
#         --config configs/partverse.yaml --tag v1
#         (update shards: ["00"] to the shard you just packed)

data:
  data_dir: "data/partverse"
  image_npz_dir: "data/partverse/images"
  mesh_npz_dir:  "data/partverse/mesh"
  # Which shards are ready to process (add as they are packed)
  shards: ["00"]
  output_dir: "outputs/partverse"
  # Pre-encoded SLAT (generated by datasets/partverse/prerender.py)
  slat_dir:    "data/partverse/slat"
  img_enc_dir: "data/partverse/img_Enc"

phase0:
  vlm_backend: "api"
  vlm_model: "gemini-3.1-flash-lite-preview"
  vlm_base_url: "https://llm-api.mmchat.xyz/v1"
  vlm_api_key: "sk-live-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJNZXRhQ2hhdCIsInN1YiI6IjY5YWViNjBjMTk2MzA4YzNlNDJiZTlhYyIsImNsaWVudF9pZCI6IjdmZGFkZDY1MDM5MGU0ZDZiZTg3OGQ0NzFiNGFkMjY5IiwiaWF0IjoxNzczMDYwODE1fQ.gohorU2KohC_lBq2DzGG9S4oGnIVbhB9R-g4nIVlwKA"
  views_for_labeling: [32, 33, 34, 35]
  max_workers: 8
  batch_size: 50
  cache_dir: "cache/phase0"

phase1:
  min_parts_per_object: 2
  max_parts_per_object: 50
  core_categories: ["body", "torso", "base", "frame", "main", "head", "wall", "floor"]
  max_swap_candidates: 5
  min_cluster_size: 50
  cache_dir: "cache/phase1"

phase2:
  alignment_strategy: "contact"
  max_scale_ratio: 3.0
  max_penetration: 0.3
  max_gap_distance: 0.15
  require_same_object_type: true
  max_part_size_ratio: 5.0
  cache_dir: "cache/phase2"

pipeline:
  attn_backend: "xformers"

phase2_5:
  enabled: true
  trellis_text_ckpt: "checkpoints/TRELLIS-text-xlarge"
  trellis_image_ckpt: "checkpoints/TRELLIS-image-large"
  num_combinations: 2
  seed: 42
  cache_dir: "cache/phase2_5"
  max_refine: 1000
  output_format: "glb"
  image_edit_backend: "local_diffusers"
  image_edit_base_url: "http://localhost:8002"
  image_edit_enabled: true
  image_edit_workers: 2
  num_edit_views: 8

phase3:
  cache_dir: "cache/phase3"
  min_volume_ratio: 0.15
  max_volume_ratio: 5.0
  min_area_ratio: 0.1
  max_area_ratio: 8.0
  min_edit_ratio: 0.02
  max_edit_ratio: 0.70
  edit_ratio_precision: 4
  min_part_proportion: 0.005
  max_part_proportion: 0.80
  max_components: 5
  min_vertices: 50
  min_extent: 0.0001
  max_center_drift: 0.3
  min_bbox_iou: 0.1
  check_vertex_color: false   # partverse meshes have no baked vertex colors
  max_penetration: 0.3
  max_gap_ratio: 0.15
  max_scale_ratio: 3.0
  instructions_per_edit: 3
  num_views: 12
  resolution: 518
  blender_path: "blender"

logging:
  level: "INFO"
  log_dir: "logs"
