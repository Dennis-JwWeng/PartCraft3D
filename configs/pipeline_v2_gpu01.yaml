# Pipeline v2 — 本机双卡 GPU 0,1 编排
# data/ 与 outputs/ 为仓库根下软链；slat 为绝对路径（/mnt/zsn/data/partverse/slat）
# 用法见 docs/ARCH.md「tmux 会话」与「管线运行入口」

ckpt_root: checkpoints
blender: /mnt/zsn/data/3DEditVerse/render_package_extracted/render_package/blender-3.5.1-linux-x64/blender
data:
  output_dir: outputs/pipeline_v2_shard00
  mesh_root: data/partverse/mesh
  images_root: data/partverse/images
  slat_dir: /mnt/zsn/data/partverse/inputs/slat
pipeline:
  gpus:
  - 0
  - 1
  prerender_workers: 4
  n_vlm_servers: 2
  vlm_port_base: 8002
  vlm_port_stride: 10
  flux_port_base: 8004
  flux_port_stride: 1
  stages:
  - name: A
    desc: phase1 VLM
    servers: vlm
    steps:
    - s1
  - name: B
    desc: highlights
    servers: none
    steps:
    - s2
    optional: true
  - name: C
    desc: FLUX 2D
    servers: flux
    steps:
    - s4
  - name: D
    desc: TRELLIS 3D edit
    servers: none
    steps:
    - s5
    use_gpus: true
  - name: D2
    desc: deletion mesh
    servers: none
    steps:
    - s5b
  - name: E
    desc: 3D rerender
    servers: none
    steps:
    - s6
    - s6b
    use_gpus: true
  - name: F
    desc: addition backfill
    servers: none
    steps:
    - s7
services:
  vlm:
    model: Qwen3.5-27B
  image_edit:
    enabled: true
    trellis_text_ckpt: checkpoints/TRELLIS-text-xlarge
    image_edit_backend: local_diffusers
    workers_per_server: 2
    export_ply: false
    export_ply_for_deletion: true
    large_part_threshold: 0.35
    repaint_mode: image
step_params:
  s5:
    num_views: 40
