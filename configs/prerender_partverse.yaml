# Portable prerender config (PartVerse).
# Cross-machine migration: update this file only; avoid editing script paths.

ckpt_root: "checkpoints"

data:
  # Dataset root; all prerender paths below can be derived from this.
  data_dir: "data/partverse"
  derive_dataset_subpaths: true

  # Used by shared logging/cache path normalization.
  output_dir: "outputs/partverse"
  shards: ["00"]
  output_by_shard: false

paths:
  # Core dataset tree
  dataset_root: "data/partverse"
  source_glb_dir: "source/normalized_glbs"
  captions_json: "source/text_captions.json"

  # Prerender artifacts
  img_enc_dir: "img_Enc"
  slat_dir: "slat"
  images_npz_dir: "images"
  mesh_npz_dir: "mesh"
  cache_root: "cache"

tools:
  # Keep executable names portable; rely on PATH by default.
  blender_path: "blender"
  blender_script: "scripts/blender_render.py"

logging:
  level: "INFO"
  log_dir: "logs/prerender_partverse"
